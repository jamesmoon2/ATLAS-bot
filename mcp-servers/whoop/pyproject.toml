[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203",
    "D212",
    "D107",
    "D102",
    "D103",
    "ANN204",
    "ANN401",
    "ARG001",
    "PLR2004",
    "PLR0911",
    "PLR0913",
    "PLR0915",
    "DTZ005",
    "F401",
    "F841",
    "BLE001",
    "TRY003",
    "TRY300",
    "TRY400",
    "EM101",
    "EM102",
    "PLR0912",
    "PLW0603",
    "C901",
    "E402",
    "EXE001",
    "INP001",
    "PERF203",
    "PYI034",
    "PYI036",
    "S101",
    "S105",
    "S106",
    "T201",
    "TC002",
    "TC003",
    "TID252",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
